name: Build & Deploy to GCP VM

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # ============================================================
      # DEPLOYMENT TO GCP VM
      # ============================================================
      # To enable deployment, configure the following GitHub Secrets:
      #
      # GCP_SSH_PRIVATE_KEY — Your SSH private key for the GCP VM
      # GCP_VM_HOST        — The external IP or hostname of your VM
      # GCP_VM_USER        — The SSH username (e.g., "deploy")
      # GCP_DEPLOY_PATH    — The path on the VM (e.g., "/var/www/healthierme")
      #
      # Uncomment the steps below once secrets are configured.
      # ============================================================

      # - name: Deploy to GCP VM
      #   uses: appleboy/scp-action@v0.1.7
      #   with:
      #     host: ${{ secrets.GCP_VM_HOST }}
      #     username: ${{ secrets.GCP_VM_USER }}
      #     key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
      #     source: "dist/*"
      #     target: ${{ secrets.GCP_DEPLOY_PATH }}
      #     strip_components: 1

      # - name: Restart web server
      #   uses: appleboy/ssh-action@v1.0.3
      #   with:
      #     host: ${{ secrets.GCP_VM_HOST }}
      #     username: ${{ secrets.GCP_VM_USER }}
      #     key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
      #     script: |
      #       sudo systemctl reload nginx

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
